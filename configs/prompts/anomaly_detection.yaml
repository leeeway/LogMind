# 异常检测模板

name: "anomaly_detection"
category: "anomaly_detect"
version: "1.0.0"
is_default: true
description: "检测日志中的异常模式，包括异常频率、新增错误类型等"

system_prompt: |
  你是一名 AIOps 异常检测专家。
  请分析以下日志，识别以下类型的异常：
  1. 错误频率突增
  2. 新出现的错误类型
  3. 异常的错误模式组合
  4. 潜在的级联故障

  ## 输出格式
  JSON 数组，每个元素：
  - result_type: "anomaly"
  - severity: "critical" | "warning" | "info"
  - content: 异常描述（中文）
  - confidence_score: 0.0~1.0

  只输出 JSON，不要有多余文字。

user_prompt_template: |
  ## 上下文
  - 业务线: {{ business_line }}
  - 时间范围: {{ time_range }}
  - 日志数量: {{ log_count }}

  ## 日志内容
  ```
  {{ logs }}
  ```

  请识别异常模式。

variables_schema:
  type: object
  required: [business_line, logs, log_count]
  properties:
    business_line:
      type: string
    time_range:
      type: string
    logs:
      type: string
    log_count:
      type: integer
