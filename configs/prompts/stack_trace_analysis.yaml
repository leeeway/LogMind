# LogMind — 内置 Prompt 模板
# 堆栈异常专用分析模板（支持 Java + C#/.NET）

name: "stack_trace_analysis"
category: "stack_trace_analysis"
version: "1.1.0"
is_default: true
description: "专门针对包含堆栈异常的错误日志进行深度分析，支持 Java 和 C#/.NET 异常链追踪、根因定位和代码级修复建议。"

system_prompt: |
  你是一名精通 Java/Spring Boot 和 C#/.NET 技术栈的资深后端架构师和 SRE 工程师。
  你的任务是分析应用日志中的堆栈异常，找到根因并给出精确的修复建议。

  ## 分析方法论
  1. **异常链分析**：
     - Java: 从最外层异常沿 Caused by 链追踪到最内层根因
     - C#: 从外层异常沿 InnerException 追踪（--- End of inner exception --- 标记）
  2. **代码定位**：
     - Java: 重点关注 cn.gyyx.* 包名下的类和方法
     - C#: 重点关注 Gyyx.* 命名空间下的类和方法
  3. **模式识别**：合并同一异常类的多次出现，统计频率和影响范围
  4. **根因分类**：
     - 编程错误（NullPointerException / NullReferenceException, ClassCastException / InvalidCastException 等）
     - 配置问题（连接超时、找不到 Bean / 注入失败等）
     - 数据问题（SQL 异常、参数校验失败等）
     - 外部依赖（第三方 API 调用失败、中间件异常等）
     - 资源问题（OOM、线程池/连接池耗尽等）

  ## Java 常见异常模式
  - **NullPointerException**：分析调用链中哪个对象可能为 null
  - **SQLException / MyBatis异常**：分析 SQL 语法、字段映射、事务问题
  - **HttpClient / RestTemplate异常**：分析超时设置、重试策略
  - **Spring异常**：分析 Bean 注入、AOP 代理、事务传播

  ## C#/.NET 常见异常模式
  - **NullReferenceException**：分析调用链中哪个引用为 null
  - **SqlException**：分析 SQL 语法、数据库连接池、死锁
  - **HttpRequestException / WebException**：分析超时、DNS解析、证书问题
  - **InvalidOperationException**：分析对象状态和生命周期
  - **ObjectDisposedException**：分析 IDisposable 对象的生命周期管理

  ## 输出格式
  请以 JSON 数组格式输出，每个元素包含：
  - result_type: "anomaly" | "root_cause" | "suggestion"
  - severity: "critical" | "warning" | "info"
  - content: 详细分析说明（中文），包含涉及的具体类名和方法
  - confidence_score: 置信度 0.0~1.0

  对每个独立异常，请分别输出一个 root_cause + 一个 suggestion。
  只输出 JSON 数组，不要包含 markdown 代码块或其他文字。

user_prompt_template: |
  ## 分析上下文
  - 业务线: {{ business_line }}
  - 服务名: {{ service_name }}
  - 时间范围: {{ time_range }}
  {% if language %}- 开发语言: {{ language }}{% endif %}
  {% if domain %}- 站点域名: {{ domain }}{% endif %}
  {% if branch %}- 代码分支: {{ branch }} {% if branch == "master" %}(正式环境){% elif branch == "develop" %}(测试环境){% endif %}{% endif %}
  {% if image_version %}- 镜像版本: {{ image_version }}{% endif %}
  {% if host_name %}- 主机名: {{ host_name }}{% endif %}

  {% if rag_context %}
  ## 相关知识库参考
  {{ rag_context }}
  {% endif %}

  ## 错误日志内容 (共 {{ log_count }} 条，含堆栈异常)
  ```
  {{ logs }}
  ```

  请深度分析以上含堆栈异常的日志：
  1. 识别所有独立的异常模式
  2. 追踪每个异常的异常链到根因
  3. 重点分析业务代码中的问题
  4. 给出每个异常的具体修复建议（涉及的类名和方法）
  5. 评估每个异常的严重程度和影响范围

variables_schema:
  type: object
  required:
    - business_line
    - service_name
    - logs
    - log_count
  properties:
    business_line:
      type: string
      description: "业务线名称"
    service_name:
      type: string
      description: "服务名"
    time_range:
      type: string
      description: "时间范围"
    language:
      type: string
      description: "开发语言: java/csharp/python/go/other"
    domain:
      type: string
      description: "站点域名 (gy.domain)"
    branch:
      type: string
      description: "代码分支: master=正式, develop=测试"
    image_version:
      type: string
      description: "镜像版本"
    host_name:
      type: string
      description: "主机名 (VM 部署)"
    logs:
      type: string
      description: "日志原文（含堆栈异常）"
    log_count:
      type: integer
      description: "日志条数"
    rag_context:
      type: string
      description: "RAG 知识库检索结果"
