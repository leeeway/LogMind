spec:
  replicas: {{ .Values.replicaCount.beat }}
  selector:
    matchLabels:
      {{- include "logmind.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: beat
  template:
    metadata:
      labels:
        {{- include "logmind.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: beat
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: beat
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - logmind.core.celery_app
            - beat
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: {{ include "logmind.fullname" . }}-config
            - secretRef:
                name: {{ include "logmind.fullname" . }}-secret
          resources:
